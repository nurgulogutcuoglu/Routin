<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Oluşturucu</title>
    <style>
        /* Modern CSS Reset ve Font */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #333; }
        
        /* Ana Kutu (Glassmorphism esintili) */
        .generator-container { background: #ffffff; width: 100%; max-width: 450px; padding: 35px 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 25px; color: #1a1a1a; font-size: 1.5rem; letter-spacing: 0.5px; }

        /* Sonuç ve Kopyala Butonu Alanı */
        .result-box { display: flex; gap: 10px; margin-bottom: 20px; }
        #passwordResult { flex: 1; padding: 12px 15px; font-size: 1.2rem; font-family: monospace; border: 2px solid #e1e1e1; border-radius: 10px; outline: none; background: #f8f9fa; color: #212529; letter-spacing: 1px; transition: border-color 0.3s; }
        #passwordResult:focus { border-color: #007bff; }
        #copyBtn { background: #007bff; color: white; border: none; padding: 0 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        #copyBtn:hover { background: #0056b3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,123,255,0.3); }

        /* Şifre Gücü Göstergesi */
        .strength-meter { font-size: 0.95rem; font-weight: 600; margin-bottom: 25px; text-align: right; color: #555; }
        #strengthText { padding: 4px 12px; border-radius: 15px; margin-left: 5px; transition: all 0.3s ease; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .weak { background: #ffebee; color: #d32f2f; }
        .medium { background: #fff3e0; color: #f57c00; }
        .strong { background: #e8f5e9; color: #388e3c; }

        /* Ayarlar Alanı */
        .settings { margin-bottom: 25px; padding: 20px; background: #f8f9fa; border-radius: 15px; border: 1px solid #eee; }
        .setting-item { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .setting-item label { font-weight: 600; font-size: 0.95rem; color: #444; display: flex; justify-content: space-between; align-items: center; }
        #passwordLength { width: 100%; cursor: pointer; accent-color: #007bff; }
        
        .checkbox-group { display: flex; flex-direction: column; gap: 12px; }
        .checkbox-group label { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 0.95rem; cursor: pointer; color: #444; transition: color 0.2s; }
        .checkbox-group label:hover { color: #007bff; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #007bff; }

        /* Ana Üret Butonu */
        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #28a745; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .main-btn:hover { background: #218838; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(40,167,69,0.3); }
    </style>
</head>
<body>

    <div class="generator-container">
        <h2>Güvenli Parola Oluştur</h2>

        <div class="result-box">
            <input type="text" id="passwordResult" readonly placeholder="Şifre burada görünecek">
            <button id="copyBtn">Kopyala</button>
        </div>

        <div class="strength-meter">
            Durum: <span id="strengthText" class="weak">Zayıf</span>
        </div>

        <div class="settings">
            <div class="setting-item">
                <label for="passwordLength">
                    Uzunluk: 
                    <span id="lengthValue" style="color: #007bff; font-size: 1.2rem;">12</span>
                </label>
                <input type="range" id="passwordLength" min="6" max="30" value="12">
            </div>

            <div class="checkbox-group">
                <label for="includeUppercase"><input type="checkbox" id="includeUppercase" checked> Büyük Harf (A-Z)</label>
                <label for="includeLowercase"><input type="checkbox" id="includeLowercase" checked> Küçük Harf (a-z)</label>
                <label for="includeNumbers"><input type="checkbox" id="includeNumbers" checked> Sayılar (0-9)</label>
                <label for="includeSymbols"><input type="checkbox" id="includeSymbols" checked> Semboller (!@#$)</label>
            </div>
        </div>

        <button id="generateBtn" class="main-btn">Şifre Üret</button>
    </div>

    <script>
        const strengthText = document.getElementById('strengthText');
        const resultInput = document.getElementById('passwordResult');
        const lengthInput = document.getElementById('passwordLength');
        const lengthValue = document.getElementById('lengthValue');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');

        const charSets = [
            { el: document.getElementById('includeUppercase'), chars: "ABCDEFGHIJKLMNOPQRSTUVWXYZ" },
            { el: document.getElementById('includeLowercase'), chars: "abcdefghijklmnopqrstuvwxyz" },
            { el: document.getElementById('includeNumbers'), chars: "0123456789" },
            { el: document.getElementById('includeSymbols'), chars: "!@#$%^&*()_+~`|}{[]:;?><,./-=" }
        ];

        // Slider değerini canlı güncelle
        lengthInput.addEventListener('input', () => {
            lengthValue.textContent = lengthInput.value;
            generatePassword(); // Slider kaydıkça şifreyi de anında değiştir
        });

        // Checkbox'lara tıklandığında anında yeni şifre üret
        charSets.forEach(set => set.el.addEventListener('change', generatePassword));

        function generatePassword() {
            const length = Number(lengthInput.value);
            let charPool = ""; 

            charSets.forEach(set => {
                if (set.el.checked) charPool += set.chars;
            });

            if (charPool === "") {
                resultInput.value = "Seçim yapın!";
                strengthText.textContent = "HATA";
                strengthText.className = "weak";
                return;
            }

            let generatedPassword = "";
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * charPool.length);
                generatedPassword += charPool[randomIndex];
            }

            resultInput.value = generatedPassword;

            // Şifre Gücü UI Güncellemesi
            if (length < 10) {
                strengthText.textContent = "Zayıf";
                strengthText.className = "weak";  
            } else if (length < 16) {
                strengthText.textContent = "Orta";
                strengthText.className = "medium"; 
            } else {
                strengthText.textContent = "Güçlü";
                strengthText.className = "strong"; 
            }
        }

        function copyPassword() {
            const pwd = resultInput.value;
            if (!pwd || pwd === "Seçim yapın!") return; 

            navigator.clipboard.writeText(pwd).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = "Kopyalandı! ✅";
                copyBtn.style.backgroundColor = "#218838"; 
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.style.backgroundColor = ""; 
                }, 2000);
            });
        }

        generateBtn.addEventListener('click', generatePassword);
        copyBtn.addEventListener('click', copyPassword);

        // Sayfa açıldığında ilk şifreyi üret
        generatePassword();
    </script>
</body>
</html>
