<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>{{ baslik }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617 !important;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 50%, #020617 100%) !important;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 0);
            background-size: 40px 40px;
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }

        .box {
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 40px rgba(249, 115, 22, 0.05);
            position: relative;
            z-index: 2;
        }

        h2 {
            margin-bottom: 25px;
            text-align: center;
            color: #f8fafc;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        h2 i {
            color: #f97316;
            margin-right: 8px;
        }

        p {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            color: #f8fafc;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        /* Customize file inputs if any */
        input[type="file"] {
            padding: 8px;
            background: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.15);
        }

        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 6px;
            color: #cbd5e1;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
            transition: all 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #fb923c, #f97316);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.3);
        }

        .btn:hover {
            background: linear-gradient(135deg, #f97316, #ea580c);
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.5);
            transform: translateY(-1px);
        }

        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
            color: #94a3b8;
            text-decoration: none;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: #f8fafc;
        }

        .errorlist {
            color: #ef4444;
            list-style: none;
            padding: 0;
            margin: 4px 0 0 0;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .errorlist li {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .errorlist li::before {
            content: "⚠️";
            font-size: 12px;
        }

        /* Twinkling star effect */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            width: 1.5px;
            height: 1.5px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration, 4s) infinite ease-in-out var(--delay, 0s);
        }
        .star-lg {
            width: 2.5px;
            height: 2.5px;
            box-shadow: 0 0 6px #fff;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(0.8); }
            50% { opacity: 0.8; transform: scale(1.3); }
        }
    </style>
</head>
<body>
<div class="stars-container" id="stars"></div>
<div class="box">
    <h2><i class="fa-solid fa-pen-to-square"></i> {{ baslik }}</h2>
    <form method="POST" enctype="multipart/form-data">{% csrf_token %}{{ form.as_p }}
        <button type="submit" class="btn"><i class="fa-solid fa-floppy-disk"></i> Kaydet</button>
    </form>
    <a href="javascript:history.back()" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Geri Dön</a>
</div>
<script>
    // Stars background generator
    document.addEventListener("DOMContentLoaded", function() {
        const starsContainer = document.getElementById('stars');
        const starCount = 80;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star' + (Math.random() > 0.85 ? ' star-lg' : '');
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--duration', (2 + Math.random() * 6) + 's');
            star.style.setProperty('--delay', (Math.random() * 5) + 's');
            starsContainer.appendChild(star);
        }

        // Sayı/rakam girilmesini engelleyen JS
        document.querySelectorAll('#id_baslik, #id_tur, #id_isim').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
            input.addEventListener('input', function(e) {
                this.value = this.value.replace(/[0-9]/g, '');
            });
        });
    });
</script>
</body>
</html>
