<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ baslik }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --netflix-red: #e50914;
            --netflix-dark: #141414;
            --netflix-black: #000000;
            --netflix-grey: #181818;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --transition-smooth: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--netflix-dark);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .box {
            background: var(--netflix-grey);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 550px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        h2 {
            margin-bottom: 30px;
            text-align: center;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 24px;
        }

        h2 i {
            color: var(--netflix-red);
            margin-right: 8px;
        }

        p {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            background: #333;
            border: 1px solid transparent;
            padding: 12px 16px;
            color: var(--text-primary);
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            transition: var(--transition-smooth);
            width: 100%;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            background: #444;
            border-color: var(--netflix-red);
        }

        input[type="file"] {
            padding: 8px 0;
            background: transparent;
        }

        .btn {
            background-color: var(--netflix-red);
            color: #ffffff;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition-smooth);
        }

        .btn:hover {
            background-color: #b20710;
        }

        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
            color: var(--text-secondary);
            text-decoration: none;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .btn-back:hover {
            color: var(--text-primary);
        }

        .errorlist {
            color: #ef4444;
            list-style: none;
            padding: 0;
            margin: 4px 0 0 0;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .errorlist li {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .errorlist li::before {
            content: "⚠️";
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2><i class="fa-solid fa-pen-to-square"></i> {{ baslik }}</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn"><i class="fa-solid fa-floppy-disk"></i> Kaydet</button>
    </form>
    <a href="javascript:history.back()" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Geri Dön</a>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Prevent numbers in titles and genres and names
        document.querySelectorAll('#id_baslik, #id_tur, #id_isim').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
            input.addEventListener('input', function(e) {
                this.value = this.value.replace(/[0-9]/g, '');
            });
        });
    });
</script>
</body>
</html>
